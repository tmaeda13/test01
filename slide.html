<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPサンプル</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* スライダー */
.slider {
  position: relative;
  width: 100%;
  height: 80vh;
  overflow: hidden;
}

.slides {
  display: flex;
  width: 300%;
  transition: transform 0.5s ease;
}

.slide {
  width: 100%;
  height: 80vh;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 2rem;
}

/* 背景色（仮） */
.slide:nth-child(1) { background: #3498db; }
.slide:nth-child(2) { background: #e74c3c; }
.slide:nth-child(3) { background: #2ecc71; }

/* ボタン */
.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 2rem;
  color: white;
  background: rgba(0,0,0,0.5);
  border: none;
  cursor: pointer;
  padding: 10px;
}

.prev { left: 10px; }
.next { right: 10px; }

/* コンテンツ */
.section {
  padding: 60px 20px;
  text-align: center;
}

.cta {
  background: #333;
  color: white;
}

.cta button {
  padding: 15px 30px;
  font-size: 1rem;
  border: none;
  background: #ff6600;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- スライダー -->
<div class="slider">
  <div class="slides" id="slides">
    <div class="slide">キャッチコピー①</div>
    <div class="slide">キャッチコピー②</div>
    <div class="slide">キャッチコピー③</div>
    <div class="slide">キャッチコピー①</div>
    <div class="slide">キャッチコピー②</div>
    <div class="slide">キャッチコピー③</div>
    <div class="slide">キャッチコピー①</div>
    <div class="slide">キャッチコピー②</div>
    <div class="slide">キャッチコピー③</div>
    <div class="slide">キャッチコピー①</div>
    <div class="slide">キャッチコピー②</div>
    <div class="slide">キャッチコピー③</div>
    <div class="slide">キャッチコピー①</div>
    <div class="slide">キャッチコピー②</div>
    <div class="slide">キャッチコピー③</div>
  </div>

  <button class="prev" onclick="moveSlide(-1)">‹</button>
  <button class="next" onclick="moveSlide(1)">›</button>
</div>

<!-- セクション -->
<div class="section">
  <h2>サービス紹介</h2>
  <p>ここにサービスの説明が入ります。シンプルでOK。</p>
</div>

<div class="section cta">
  <h2>今すぐお問い合わせ</h2>
  <button>お問い合わせする</button>
</div>

<script>
let currentIndex = 0;
const slides = document.getElementById("slides");
const totalSlides = 3;

// 手動操作
function moveSlide(direction) {
  currentIndex += direction;

  if (currentIndex < 0) currentIndex = totalSlides - 1;
  if (currentIndex >= totalSlides) currentIndex = 0;

  updateSlide();
}

// 表示更新
function updateSlide() {
  slides.style.transform = "translateX(-" + (currentIndex * 100) + "%)";
}

// 自動スライド
setInterval(() => {
  moveSlide(1);
}, 3000);
</script>

</body>
</html>
